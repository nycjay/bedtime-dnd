<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — {{ app_name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
  <link rel="icon" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/theme.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center" data-theme="dark">
  <script>
    (function() {
      let t = localStorage.getItem('theme') || 'dark';
      if (t === 'system') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.body.setAttribute('data-theme', t);
    })();
  </script>

  <div class="w-full max-w-sm mx-auto px-6 space-y-6">
    <h1 class="text-3xl text-center" style="color: var(--accent); font-family: MedievalSharp">Set New Password</h1>

    <div id="error" class="hidden p-3 rounded text-sm" style="background: rgba(220,38,38,0.2); color: #fca5a5;">
      Invalid or expired reset link. <a href="/login" class="underline" style="color: var(--accent)">Request a new one</a>.
    </div>

    <form id="resetForm" method="post" action="/reset-password" class="space-y-3 hidden">
      <input type="hidden" name="access_token" id="accessToken">
      <input type="hidden" name="refresh_token" id="refreshToken">
      <input name="password" type="password" placeholder="New password" required minlength="6"
             class="w-full p-3 rounded" style="background: var(--input); color: var(--text); border: 1px solid rgba(255,255,255,0.1)">
      <button type="submit" class="w-full p-3 rounded font-bold text-white" style="background: var(--accent)">
        Reset Password
      </button>
    </form>

    <p class="text-center text-sm muted">
      <a href="/login" style="color: var(--accent)" class="hover:underline">← Back to login</a>
    </p>
  </div>

  <script>
    // Supabase puts tokens in the URL fragment: #access_token=...&refresh_token=...
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (accessToken && refreshToken) {
      document.getElementById('accessToken').value = accessToken;
      document.getElementById('refreshToken').value = refreshToken;
      document.getElementById('resetForm').classList.remove('hidden');
    } else {
      document.getElementById('error').classList.remove('hidden');
    }
  </script>
</body>
</html>
